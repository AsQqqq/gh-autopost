services:
  gh-autopost:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - server_server-net

  # Init mode: run once to record existing commits without posting
  # Usage: docker compose run --rm gh-autopost-init
  gh-autopost-init:
    build: .
    env_file:
      - .env
    command: ["--save"]
    profiles:
      - init
    networks:
      - server_server-net

networks:
  server_server-net:
    external: true
