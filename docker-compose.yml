services:
  gh-autopost:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - default
      - postgres_net

  # Init mode: run once to record existing commits without posting
  # Usage: docker compose run --rm gh-autopost-init
  gh-autopost-init:
    build: .
    env_file:
      - .env
    command: ["--save"]
    profiles:
      - init
    networks:
      - default
      - postgres_net

networks:
  postgres_net:
    external: true
    name: postgres_net
